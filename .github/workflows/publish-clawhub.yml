name: Publish to ClawHub

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish, for example 0.1.1'
        required: true
      changelog:
        description: 'Changelog text for this release'
        required: false
        default: ''

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install ClawHub CLI
        run: npm i -g clawdhub

      - name: Resolve version and changelog
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            CHANGELOG="${{ github.event.inputs.changelog }}"
          else
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
            CHANGELOG="Release ${TAG}"
          fi

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must be semver like 0.1.1" >&2
            exit 1
          fi

          if [[ -z "$CHANGELOG" ]]; then
            CHANGELOG="Release v${VERSION}"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGELOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Login to ClawHub
        env:
          CLAWDHUB_TOKEN: ${{ secrets.CLAWDHUB_TOKEN }}
        run: |
          test -n "$CLAWDHUB_TOKEN"
          clawdhub login --token "$CLAWDHUB_TOKEN"
          clawdhub whoami

      - name: Publish skill
        run: |
          clawdhub publish . \
            --slug youtube-transcript-fetcher \
            --name "YouTube Transcript Fetcher" \
            --version "${{ steps.meta.outputs.version }}" \
            --changelog "${{ steps.meta.outputs.changelog }}"
